<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — AI Resume & Job Matching</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-1: #1e3a5f;
      --bg-2: #4a78c2;
      --bg-3: #6eb5d9;
      --surface: rgba(255, 255, 255, 0.94);
      --text: #1a2332;
      --muted: #5c6b7f;
      --accent: #4a78c2;
      --accent-dark: #355fa3;
      --error: #c53030;
      --radius: 16px;
      --shadow: 0 24px 48px rgba(30, 58, 95, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      color: var(--text);
      overflow-x: hidden;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
      background-size: 200% 200%;
      animation: gradientShift 12s ease infinite;
      z-index: -2;
    }

    .bg::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.15) 0%, transparent 45%),
        radial-gradient(circle at 80% 70%, rgba(255, 255, 255, 0.12) 0%, transparent 40%);
      animation: pulseGlow 8s ease-in-out infinite alternate;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes pulseGlow {
      from { opacity: 0.6; transform: scale(1); }
      to { opacity: 1; transform: scale(1.02); }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.45;
      z-index: -1;
      animation: floatOrb 18s ease-in-out infinite;
    }

    .orb--1 {
      width: 280px;
      height: 280px;
      background: #8ec5fc;
      top: -80px;
      right: -40px;
      animation-delay: 0s;
    }

    .orb--2 {
      width: 320px;
      height: 320px;
      background: #a8d8ea;
      bottom: -100px;
      left: -60px;
      animation-delay: -6s;
    }

    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(-20px, 24px); }
      66% { transform: translate(16px, -16px); }
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 960px;
      width: 100%;
      background: var(--surface);
      border-radius: calc(var(--radius) + 8px);
      box-shadow: var(--shadow);
      overflow: hidden;
      opacity: 0;
      transform: translateY(28px) scale(0.98);
      animation: cardEnter 0.85s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes cardEnter {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .panel {
      padding: 44px 40px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .brand__mark {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(145deg, var(--accent), var(--bg-3));
      display: grid;
      place-items: center;
      color: white;
      font-weight: 700;
      font-size: 18px;
      animation: markPulse 3s ease-in-out infinite;
    }

    @keyframes markPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74, 120, 194, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(74, 120, 194, 0); }
    }

    .brand__text {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--muted);
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 8px;
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 0 0 28px;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .social-row {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn-social {
      flex: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(26, 35, 50, 0.12);
      border-radius: 10px;
      background: white;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .btn-social:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(30, 58, 95, 0.12);
      border-color: rgba(74, 120, 194, 0.35);
    }

    .btn-social:active {
      transform: translateY(0);
    }

    .btn-social svg {
      flex-shrink: 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 4px 0 22px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(26, 35, 50, 0.12);
    }

    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      padding: 13px 14px;
      border: 2px solid rgba(26, 35, 50, 0.1);
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      background: #fafbfc;
      transition: border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .input-wrap input:focus {
      outline: none;
      border-color: var(--accent);
      background: white;
      box-shadow: 0 0 0 4px rgba(74, 120, 194, 0.2);
      animation: inputGlow 0.5s ease;
    }

    @keyframes inputGlow {
      from { box-shadow: 0 0 0 0 rgba(74, 120, 194, 0.35); }
    }

    .input-wrap input.input--error {
      border-color: var(--error);
      animation: shake 0.45s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .password-row {
      display: flex;
      align-items: stretch;
      border: 2px solid rgba(26, 35, 50, 0.1);
      border-radius: 10px;
      background: #fafbfc;
      overflow: hidden;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .password-row:focus-within {
      border-color: var(--accent);
      background: white;
      box-shadow: 0 0 0 4px rgba(74, 120, 194, 0.2);
    }

    .password-row.input--error {
      border-color: var(--error);
      animation: shake 0.45s ease;
    }

    .password-row input {
      flex: 1;
      border: none;
      padding: 13px 14px;
      font-family: inherit;
      font-size: 15px;
      background: transparent;
    }

    .password-row input:focus {
      outline: none;
      box-shadow: none;
    }

    .toggle-pw {
      border: none;
      background: transparent;
      padding: 0 14px;
      cursor: pointer;
      color: var(--muted);
      font-size: 18px;
      line-height: 1;
      transition: color 0.2s ease, transform 0.2s ease;
    }

    .toggle-pw:hover {
      color: var(--accent);
      transform: scale(1.1);
    }

    .row-between {
      display: flex;
      justify-content: flex-end;
      margin: -8px 0 22px;
    }

    .link {
      color: var(--accent);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      position: relative;
    }

    .link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -2px;
      width: 0;
      height: 2px;
      background: var(--accent);
      transition: width 0.25s ease;
    }

    .link:hover::after {
      width: 100%;
    }

    .btn-primary {
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 8px 24px rgba(74, 120, 194, 0.4);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(74, 120, 194, 0.45);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.75;
      cursor: wait;
    }

    .btn-primary .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.45);
      transform: scale(0);
      animation: ripple 0.6s linear;
      pointer-events: none;
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    .footer-text {
      text-align: center;
      margin-top: 22px;
      font-size: 14px;
      color: var(--muted);
    }

    .footer-text a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .footer-text a:hover {
      text-decoration: underline;
    }

    .msg {
      min-height: 22px;
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 500;
    }

    .msg--error {
      color: var(--error);
      animation: fadeIn 0.35s ease;
    }

    .msg--ok {
      color: #2f855a;
      animation: fadeIn 0.35s ease;
    }

    .msg--info {
      color: var(--accent-dark);
      animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero {
      background: linear-gradient(160deg, var(--bg-2) 0%, var(--bg-1) 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 32px;
      color: white;
      text-align: center;
    }

    .hero__visual {
      width: min(240px, 70%);
      margin-bottom: 24px;
      animation: floatY 5s ease-in-out infinite;
    }

    @keyframes floatY {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-14px); }
    }

    .hero h2 {
      margin: 0 0 12px;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .hero p {
      margin: 0;
      font-size: 0.95rem;
      line-height: 1.55;
      opacity: 0.92;
      max-width: 280px;
    }

    .hero-dots {
      display: flex;
      gap: 8px;
      margin-top: 28px;
    }

    .hero-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.35);
      animation: dotbounce 1.4s ease-in-out infinite;
    }

    .hero-dots span:nth-child(2) { animation-delay: 0.15s; }
    .hero-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes dotbounce {
      0%, 80%, 100% { transform: scale(1); opacity: 0.35; }
      40% { transform: scale(1.35); opacity: 1; }
    }

    @media (max-width: 820px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .hero {
        order: -1;
        padding: 32px 24px;
      }

      .hero__visual {
        width: 160px;
        margin-bottom: 16px;
      }

      .panel {
        padding: 32px 24px 36px;
      }
    }
  </style>
</head>
<body>
  <div class="bg" aria-hidden="true"></div>
  <div class="orb orb--1" aria-hidden="true"></div>
  <div class="orb orb--2" aria-hidden="true"></div>

  <div class="page">
    <div class="shell">
      <div class="panel">
        <div class="brand">
          <div class="brand__mark" aria-hidden="true">AI</div>
          <span class="brand__text">Resume &amp; Job Matching</span>
        </div>
        <h1 id="authTitle">Welcome back</h1>
        
        <div id="formMessage" class="msg" role="status" aria-live="polite"></div>

    

        <form id="authForm" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <div class="input-wrap">
              <input type="email" id="email" name="email" autocomplete="username" placeholder="you@example.com" required>
            </div>
          </div>
          <div class="field">
            <label for="password">Password</label>
            <div class="password-row" id="passwordRow">
              <input type="password" id="password" name="password" autocomplete="current-password" placeholder="Enter your password" required minlength="6">
              <button type="button" class="toggle-pw" id="togglePw" aria-label="Show password">👁</button>
            </div>
          </div>
          <div class="row-between">
            <a class="link" href="#" id="forgotPwLink">Forgot password?</a>
          </div>
          <button type="submit" class="btn-primary" id="btnLogin">Sign in</button>
        </form>

        <p class="footer-text">
          <span id="footerPrompt">New here?</span> <a href="#" id="authToggleLink">Create an account</a>
        </p>
      </div>

      <aside class="hero" aria-hidden="true">
        <svg class="hero__visual" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="88" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
          <rect x="52" y="56" width="96" height="120" rx="10" fill="rgba(255,255,255,0.2)"/>
          <rect x="66" y="72" width="68" height="8" rx="4" fill="white" opacity="0.9"/>
          <rect x="66" y="92" width="52" height="8" rx="4" fill="white" opacity="0.65"/>
          <rect x="66" y="112" width="60" height="8" rx="4" fill="white" opacity="0.65"/>
          <rect x="66" y="132" width="44" height="8" rx="4" fill="white" opacity="0.5"/>
          <circle cx="142" cy="148" r="28" fill="#a8d8ea" opacity="0.95"/>
          <path d="M132 148l-8 8-8-8" stroke="#1e3a5f" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h2>Smarter matching</h2>
        <p>Upload a resume once—get role suggestions, skill gaps, and Check Ats Score by AI.</p>
        <div class="hero-dots">
          <span></span><span></span><span></span>
        </div>
      </aside>
    </div>
  </div>

  <script>
const form = document.getElementById("authForm");
const email = document.getElementById("email");
const password = document.getElementById("password");
const passwordRow = document.getElementById("passwordRow");
const togglePw = document.getElementById("togglePw");
const btnLogin = document.getElementById("btnLogin");
const msg = document.getElementById("formMessage");
const authTitle = document.getElementById("authTitle");
const authToggleLink = document.getElementById("authToggleLink");
const footerPrompt = document.getElementById("footerPrompt");
const forgotPwLink = document.getElementById("forgotPwLink");

let isRegisterMode = false;
const USERS_KEY = "users";

function getUsers() {
  try {
    const stored = JSON.parse(localStorage.getItem(USERS_KEY));
    return Array.isArray(stored) ? stored : [];
  } catch (error) {
    return [];
  }
}

function saveUsers(users) {
  localStorage.setItem(USERS_KEY, JSON.stringify(users));
}

function findUserByEmail(emailVal) {
  return getUsers().find((u) => u.email.toLowerCase() === emailVal.toLowerCase());
}

function setAuthMode(registerMode) {
  isRegisterMode = registerMode;
  authTitle.textContent = registerMode ? "Create your account" : "Welcome back";
  btnLogin.textContent = registerMode ? "Create account" : "Sign in";
  footerPrompt.textContent = registerMode ? "Already have an account?" : "New here?";
  authToggleLink.textContent = registerMode ? "Sign in" : "Create an account";
  forgotPwLink.style.visibility = registerMode ? "hidden" : "visible";
  setMessage("", "");
}

function setMessage(text, type) {
  msg.textContent = text;
  msg.className = "msg";
  if (type === "error") msg.classList.add("msg--error");
  if (type === "ok") msg.classList.add("msg--ok");
  if (type === "info") msg.classList.add("msg--info");
}

function validateEmail() {
  const value = email.value.trim();
  const valid = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(value);

  if (!value || !valid) {
    email.classList.add("input--error");
    return false;
  }

  email.classList.remove("input--error");
  return true;
}

function validatePassword() {
  const value = password.value.trim();

  const hasMinLen = value.length >= 8;
  const hasUpper = /[A-Z]/.test(value);
  const hasLower = /[a-z]/.test(value);
  const hasNumber = /\d/.test(value);
  const hasSpecial = /[^A-Za-z0-9]/.test(value);
  const valid = hasMinLen && hasUpper && hasLower && hasNumber && hasSpecial;

  if (!valid) {
    passwordRow.classList.add("input--error");
    return false;
  }

  passwordRow.classList.remove("input--error");
  return true;
}

email.addEventListener("input", () => {
  if (email.classList.contains("input--error")) validateEmail();
});

password.addEventListener("input", () => {
  if (passwordRow.classList.contains("input--error")) validatePassword();
});

email.addEventListener("blur", validateEmail);
password.addEventListener("blur", validatePassword);

togglePw.addEventListener("click", () => {
  const isHidden = password.type === "password";
  password.type = isHidden ? "text" : "password";
  togglePw.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
  togglePw.textContent = isHidden ? "🙈" : "👁";
});

form.addEventListener("submit", function (e) {
  e.preventDefault();

  const emailVal = email.value.trim();
  const passVal = password.value.trim();

  if (!emailVal || !passVal) {
    setMessage("Please fill in both email and password.", "error");
    validateEmail();
    validatePassword();
    return;
  }

  const emailOk = validateEmail();
  const passOk = validatePassword();

  if (!emailOk) {
    setMessage("Enter a valid email address (example: name@email.com).", "error");
    return;
  }

  if (!passOk) {
    setMessage("Password must be 8+ chars and include uppercase, lowercase, number, and special character.", "error");
    return;
  }

  btnLogin.disabled = true;

  if (isRegisterMode) {
    btnLogin.textContent = "Creating account...";
    setMessage("Registering your account...", "info");

    const existingUser = findUserByEmail(emailVal);
    if (existingUser) {
      btnLogin.disabled = false;
      btnLogin.textContent = "Create account";
      setMessage("This email is already registered. Please sign in.", "error");
      return;
    }

    const users = getUsers();
    users.push({
      email: emailVal,
      password: passVal
    });
    saveUsers(users);

    btnLogin.disabled = false;
    btnLogin.textContent = "Create account";
    setMessage("Registration successful. Please sign in with the same password.", "ok");
    password.value = "";
    setAuthMode(false);
    return;
  }

  btnLogin.textContent = "Signing in...";
  setMessage("Validation passed. Logging in...", "info");

  const user = findUserByEmail(emailVal);
  if (!user) {
    btnLogin.disabled = false;
    btnLogin.textContent = "Sign in";
    setMessage("No account found. Please create an account first.", "error");
    return;
  }

  if (user.password !== passVal) {
    btnLogin.disabled = false;
    btnLogin.textContent = "Sign in";
    setMessage("Incorrect password. Please use your registered password.", "error");
    passwordRow.classList.add("input--error");
    return;
  }

  const username = emailVal.split("@")[0];
  localStorage.setItem("username", username);

  if (emailVal.toLowerCase().includes("company")) {
    localStorage.setItem("role", "company");
  } else {
    localStorage.setItem("role", "student");
  }

  localStorage.setItem("isLoggedIn", "true");
  setMessage("Login successful!", "ok");

  setTimeout(() => {
    window.location.href = "HomePage.html";
  }, 900);
});

authToggleLink.addEventListener("click", function (e) {
  e.preventDefault();
  setAuthMode(!isRegisterMode);
});

setAuthMode(false);
</script>
</body>
</html>
